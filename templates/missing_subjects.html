<!DOCTYPE html>
<html>
<head>
    <title>Missing Subject Codes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow p-5">

        <h3 class="mb-4">Unknown Subject Codes Found</h3>

        <form action="/submit_subjects" method="POST">

            {% for code in codes %}
            <div class="mb-3">
                <label class="form-label">
                    Enter subject name for code {{ code }}
                </label>
                <input type="text"
                       name="{{ code }}"
                       class="form-control"
                       required>
            </div>
            {% endfor %}

            <button type="submit" class="btn btn-primary">
                Continue
            </button>

        </form>

    </div>
</div>

</body>
</html>
