<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enter Teacher Names</title>

<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<style>
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
}

.bg-gradient-flow {
    background: linear-gradient(-45deg, #4F46E5, #DB2777, #7C3AED, #E11D48);
    background-size: 400% 400%;
    animation: gradientFlow 15s ease infinite;
}

@keyframes gradientFlow {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}
</style>
</head>

<body class="bg-gradient-flow min-h-screen flex items-center justify-center p-6 text-white">

<div class="w-full max-w-2xl bg-white/10 backdrop-blur-3xl border border-white/20 rounded-[2.5rem] shadow-2xl p-12">

    <div class="text-center mb-10">
        <h1 class="text-4xl font-bold tracking-tight">
            Subject Teacher Assignment
        </h1>
        <p class="text-white/70 mt-3 text-lg">
            Please provide the teacher name for each subject.
        </p>
    </div>

    <form action="/submit_teachers" method="POST" class="space-y-6">

        {% for subject in subjects %}
        <div class="bg-white/5 border border-white/20 rounded-2xl p-6 hover:bg-white/10 transition">
            
            <label class="block font-semibold mb-3">
                {{ subject }}
            </label>

            <input type="text"
                   name="{{ subject }}"
                   placeholder="Enter teacher name"
                   required
                   class="w-full bg-white/10 border border-white/30 rounded-xl p-3 text-white placeholder-white/50 focus:outline-none focus:ring-2 focus:ring-white/60 transition">
        
        </div>
        {% endfor %}

        <button type="submit"
            class="w-full h-14 bg-white text-indigo-950 font-bold text-lg rounded-xl shadow-xl hover:bg-white/90 hover:scale-[1.01] transition">
            Continue & Generate Report
        </button>

    </form>

</div>

</body>
</html>
