<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CBSE Result Analyzer</title>

<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Inter', sans-serif;
    margin: 0;
}
.bg-gradient-flow {
    background: linear-gradient(-45deg, #4F46E5, #DB2777, #7C3AED, #E11D48);
    background-size: 400% 400%;
    animation: gradientFlow 15s ease infinite;
}
@keyframes gradientFlow {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}
</style>
</head>

<body class="bg-gradient-flow min-h-screen flex items-center justify-center p-6 sm:p-12 text-white">

<div class="bg-white/10 backdrop-blur-3xl border border-white/20 rounded-[2.5rem] shadow-2xl w-full max-w-lg p-10 sm:p-14">

    <div class="text-center space-y-3 mb-8">
        <h1 class="text-4xl sm:text-5xl font-bold tracking-tight" style="font-family: 'Outfit', sans-serif;">
            CBSE Result Analyzer
        </h1>
        <p class="text-white/70 text-lg">
            Upload Gazette (.txt) file to generate Excel report
        </p>
    </div>

    <form action="/upload" method="POST" enctype="multipart/form-data" class="space-y-6">

        <label for="file-input"
            class="border-2 border-dashed border-white/30 rounded-3xl h-64 flex flex-col items-center justify-center cursor-pointer bg-white/5 hover:bg-white/10 hover:border-white/60 transition-all text-center px-6">

            <span class="text-xl font-semibold mb-2">
                Drag & Drop TXT file
            </span>
            <span class="text-sm opacity-70">
                or click to browse
            </span>
        </label>

        <input type="file" name="file" id="file-input" accept=".txt" hidden required>

        <div id="file-info" class="hidden text-center text-sm text-white/70">
            Selected file: <span id="file-name" class="font-semibold"></span>
        </div>

        <button type="submit"
            class="w-full h-14 bg-white text-indigo-950 font-bold text-lg rounded-xl shadow-xl hover:bg-white/90 transition-all">
            Process & Generate Report
        </button>

    </form>

    <p class="text-center text-sm text-white/60 mt-8">
        Files are processed securely and not stored permanently.
    </p>

</div>

<script>
const dropZone = document.querySelector("label[for='file-input']");
const fileInput = document.getElementById("file-input");
const fileInfo = document.getElementById("file-info");
const fileName = document.getElementById("file-name");

function updateFile(file) {
    if (!file) return;

    if (!file.name.endsWith(".txt")) {
        alert("Only .txt Gazette files allowed.");
        fileInput.value = "";
        fileInfo.classList.add("hidden");
        return;
    }

    fileName.textContent = file.name;
    fileInfo.classList.remove("hidden");
}

fileInput.addEventListener("change", (e) => updateFile(e.target.files[0]));

["dragover", "dragleave", "drop"].forEach(eventName => {
    dropZone.addEventListener(eventName, (e) => {
        e.preventDefault();
        if (eventName === "drop") {
            fileInput.files = e.dataTransfer.files;
            updateFile(e.dataTransfer.files[0]);
        }
    });
});
</script>

</body>
</html>
