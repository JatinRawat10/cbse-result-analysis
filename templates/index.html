<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CBSE Result Analyzer</title>

<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<style>
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
}

.bg-gradient-flow {
    background: linear-gradient(-45deg, #4F46E5, #DB2777, #7C3AED, #E11D48);
    background-size: 400% 400%;
    animation: gradientFlow 15s ease infinite;
}

@keyframes gradientFlow {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}
</style>
</head>

<body class="bg-gradient-flow min-h-screen flex items-center justify-center p-6 text-white">

<div class="w-full max-w-xl bg-white/10 backdrop-blur-3xl border border-white/20 rounded-[2.5rem] shadow-2xl p-12">

    <div class="text-center mb-10">
        <h1 class="text-4xl font-bold tracking-tight">
            CBSE Result Analyzer
        </h1>
        <p class="text-white/70 mt-3 text-lg">
            Upload Gazette (.txt) file to generate Excel report
        </p>
    </div>

    <form action="/upload" method="POST" enctype="multipart/form-data" id="uploadForm">

        <!-- Drag Drop Area -->
        <label id="dropArea"
               class="flex flex-col items-center justify-center border-2 border-dashed border-white/40 rounded-2xl h-48 cursor-pointer bg-white/5 hover:bg-white/10 transition text-center px-6">

            <span class="text-lg font-semibold">
                Drag & Drop TXT File
            </span>
            <span class="text-sm text-white/60 mt-2">
                or click to browse
            </span>

            <span id="fileName" class="mt-4 text-white/80 text-sm hidden"></span>
        </label>

        <!-- Important -->
        <input type="file"
               name="file"
               id="fileInput"
               accept=".txt"
               hidden
               required>

        <button type="submit"
                class="mt-8 w-full h-14 bg-white text-indigo-950 font-bold text-lg rounded-xl shadow-xl hover:bg-white/90 hover:scale-[1.01] transition">
            Process & Generate Report
        </button>

    </form>

    <p class="text-center text-sm text-white/60 mt-6">
        Files are processed securely and not stored permanently.
    </p>

</div>

<script>
const dropArea = document.getElementById("dropArea");
const fileInput = document.getElementById("fileInput");
const fileName = document.getElementById("fileName");
const form = document.getElementById("uploadForm");

dropArea.addEventListener("click", () => fileInput.click());

fileInput.addEventListener("change", (e) => {
    handleFile(e.target.files[0]);
});

dropArea.addEventListener("dragover", (e) => {
    e.preventDefault();
    dropArea.classList.add("border-white", "bg-white/20");
});

dropArea.addEventListener("dragleave", () => {
    dropArea.classList.remove("border-white", "bg-white/20");
});

dropArea.addEventListener("drop", (e) => {
    e.preventDefault();
    dropArea.classList.remove("border-white", "bg-white/20");

    const file = e.dataTransfer.files[0];
    handleFile(file);
    fileInput.files = e.dataTransfer.files;
});

function handleFile(file) {
    if (!file) return;

    if (!file.name.toLowerCase().endsWith(".txt")) {
        alert("Only .txt Gazette files are allowed.");
        fileInput.value = "";
        fileName.classList.add("hidden");
        return;
    }

    fileName.textContent = "Selected: " + file.name;
    fileName.classList.remove("hidden");
}
</script>

</body>
</html>
